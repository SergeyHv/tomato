<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админка томатов</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Админка сортов томатов</h1>

  <div id="container">

    <div id="list-panel">
      <h2>Список сортов</h2>
      <button id="add-new">Добавить сорт</button>
      <div id="items"></div>
    </div>

    <div id="form-panel" class="hidden">
      <h2 id="form-title">Добавить сорт</h2>

      <form id="tomato-form">
        <input type="hidden" id="id">
        <input type="hidden" id="version">

        <label>Название</label>
        <input id="name" required>

        <label>Описание</label>
        <textarea id="description"></textarea>

        <label>Главное фото (URL)</label>
        <input id="mainphoto">

        <label>Цвет</label>
        <input id="color">

        <label>Тип</label>
        <input id="type">

        <label>Размер</label>
        <input id="size">

        <label>Сезон</label>
        <input id="season">

        <label>Галерея (через запятую)</label>
        <input id="gallery_photos">

        <label>Происхождение</label>
        <input id="origin">

        <div class="buttons">
          <button type="submit" id="save-btn">Сохранить</button>
          <button type="button" id="cancel-btn">Отмена</button>
        </div>
      </form>
    </div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
