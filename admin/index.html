<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка: Любимые Томаты</title>
  <link rel="stylesheet" href="css/styles.css"> </head>
<body>

  <h1>🍅 Моя коллекция томатов</h1>

  <div id="container">
    
    <div id="list-panel">
      <div class="controls">
        <input type="text" id="search-input" placeholder="Найти сорт по названию..." oninput="handleSearch(this.value)">
        <button id="add-new">+ Добавить новый сорт</button>
      </div>
      
      <div id="items">
        <p style="text-align:center;">Загрузка коллекции...</p>
      </div>
    </div>

    <div id="form-panel" class="hidden">
      <h2 id="form-title">Добавить сорт</h2>
      <form id="tomato-form">
        <input type="hidden" id="id">
        <input type="hidden" id="version">

        <label>Название сорта</label>
        <input type="text" id="name" required placeholder="Напр: Зузи - 3476">

        <label>Описание</label>
        <textarea id="description" placeholder="Расскажите о вкусе, урожайности..."></textarea>

        <div style="display: flex; gap: 10px; align-items: flex-end;">
          <div style="flex-grow: 1;">
            <label>Главное фото (ссылка)</label>
            <input type="text" id="mainphoto" placeholder="https://...">
          </div>
          <button type="button" id="upload-photo-btn" style="margin-bottom: 20px; background: #43a047; color: white;">Загрузить фото</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label>Цвет</label>
            <input type="text" id="color" placeholder="Красный, желтый...">
          </div>
          <div>
            <label>Тип</label>
            <input type="text" id="type" placeholder="Черри, Крупный...">
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div>
            <label>Размер</label>
            <input type="text" id="size" placeholder="100-200г">
          </div>
          <div>
            <label>Сезон</label>
            <input type="text" id="season" placeholder="Ранний, Средний...">
          </div>
        </div>

        <div class="buttons">
          <button type="submit" id="save-btn">Сохранить сорт</button>
          <button type="button" id="cancel-btn">Отмена</button>
        </div>
      </form>
    </div>

  </div>

  <div id="upload-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Загрузка фотографии</h3>
      <input type="file" id="upload-file" accept="image/*">
      <div id="upload-result" class="hidden" style="margin-top:15px;">
        <input type="text" id="upload-url" readonly>
        <button id="upload-copy">Копировать ссылку</button>
      </div>
      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="upload-start" style="background: #e53935; color: white; flex:1;">Начать загрузку</button>
        <button id="upload-close" style="flex:1;">Закрыть</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
