<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tomato Admin — загрузка фото</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Загрузка фото в каталог</h1>

  <div class="upload-box">
    <input type="file" id="fileInput" accept="image/*">
    <button id="uploadBtn">Загрузить</button>
  </div>

  <div id="result" class="hidden">
    <p>Фото загружено!</p>
    <input id="imageUrl" readonly>
    <button id="copyBtn">Скопировать ссылку</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
