<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Каталог коллекционных томатов</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .container {
    max-width: 600px;
    padding: 20px;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  p {
    font-size: 18px;
    color: #555;
    margin-bottom: 30px;
  }

  a.button {
    display: inline-block;
    padding: 12px 25px;
    background: #d62828;
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 8px;
    transition: 0.2s;
  }

  a.button:hover {
    background: #b71c1c;
    transform: scale(1.05);
  }

  @media (max-width: 600px) {
    h1 { font-size: 26px; }
    p { font-size: 16px; }
    a.button { font-size: 18px; padding: 14px 30px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Каталог коллекционных томатов</h1>
  <p>Добро пожаловать! Здесь собраны редкие и уникальные сорта томатов с описаниями, фото и характеристиками.</p>

  <a href="catalog.html" class="button">Перейти в каталог</a>
</div>

</body>
</html>
