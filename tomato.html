<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Томат — карточка сорта</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #faf5e6;
            color: #222;
        }

        header {
            padding: 12px 16px;
            background: #b22222;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            padding: 8px 14px;
            background: #d32f2f;
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
        }

        .card-photo {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 16px;
            background: #eee;
            margin-bottom: 16px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .meta {
            font-size: 15px;
            color: #555;
            margin-bottom: 16px;
        }

        .desc {
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .not-found {
            font-size: 20px;
            margin-top: 40px;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    <h1>Карточка томата</h1>
</header>

<main>
    <a href="catalog.html" class="back-link">← Назад в каталог</a>

    <img id="photo" class="card-photo" src="" alt="">

    <div id="title" class="title"></div>
    <div id="meta" class="meta"></div>
    <div id="desc" class="desc"></div>

    <div id="notFound" class="not-found" style="display:none;">
        Сорт с таким ID не найден.
    </div>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1fdNIH6J3sLQDzsEXm-RRl8VlbBfWfEiPhpL_3xWHZfesBJ_qpCBEsEU0Xe4wbkAzDAntYFSP2cnQ/pub?output=csv";

function normalize(s) {
    return String(s || "").trim().toLowerCase();
}

function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    const header = rows[0].split(",").map(h => h.trim().toLowerCase());
    return rows.slice(1).map(row => {
        const cols = row.split(",");
        const obj = {};
        header.forEach((name, idx) => {
            obj[name] = (cols[idx] || "").trim();
        });
        return obj;
    });
}

function getPhotoUrl(item) {
    const url = (item.mainphoto || item.photo || "").trim();
    if (!url || url === "undefined" || url === "null") {
        return "https://placehold.co/600x400?text=No+Photo";
    }
    return url;
}

(async function() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const photoEl = document.getElementById("photo");
    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const descEl = document.getElementById("desc");
    const notFoundEl = document.getElementById("notFound");

    if (!id) {
        notFoundEl.style.display = "block";
        return;
    }

    try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const data = parseCSV(text);

        const item = data.find(row => normalize(row.id) === normalize(id));

        if (!item) {
            notFoundEl.style.display = "block";
            return;
        }

        // Фото
        photoEl.src = getPhotoUrl(item);
        photoEl.alt = item.name || item.id || "Томат";

        // Заголовок
        titleEl.textContent = item.name || ("ID: " + item.id);

        // Метаданные
        const parts = [];
        if (item.color) parts.push("Цвет: " + item.color);
        if (item.type) parts.push("Тип: " + item.type);
        if (item.size) parts.push("Размер: " + item.size);
        metaEl.textContent = parts.join(" • ");

        // Описание
        descEl.textContent = item.desc || item.description || "";

    } catch (e) {
        console.error("Ошибка загрузки", e);
        notFoundEl.style.display = "block";
        notFoundEl.textContent = "Ошибка загрузки данных";
    }
})();
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1fdNIH6J3sLQDzsEXm-RRl8VlbBfWfEiPhpL_3xWHZfesBJ_qpCBEsEU0Xe4wbkAzDAntYFSP2cnQ/pub?output=csv";

let allData = [];
const activeFilters = {
    search: "",
    color: [],
    type: [],
    size: []
};

const cardsContainer = document.getElementById("catalog");
const noResultsEl = document.getElementById("noResults");
const searchInput = document.getElementById("searchInput");

function normalizeString(s) {
    return String(s || "").trim().toLowerCase();
}

function uniqueSorted(arr) {
    return Array.from(new Set(arr.filter(v => v && v.trim() !== "")))
        .sort((a, b) => a.localeCompare(b, "ru"));
}

function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    const header = rows[0].split(",").map(h => h.trim().toLowerCase());
    return rows.slice(1).map(row => {
        const cols = row.split(",");
        const obj = {};
        header.forEach((name, idx) => {
            obj[name] = (cols[idx] || "").trim();
        });
        return obj;
    });
}

function getPhotoUrl(item) {
    const url = (item.mainphoto || item.photo || "").trim();
    if (!url || url === "undefined" || url === "null") {
        return "https://placehold.co/300x200?text=No+Photo";
    }
    return url;
}

function renderCards(data) {
    cardsContainer.innerHTML = "";

    if (!data || data.length === 0) {
        noResultsEl.style.display = "block";
        return;
    } else {
        noResultsEl.style.display = "none";
    }

    const frag = document.createDocumentFragment();

    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = getPhotoUrl(item);
        img.alt = item.name || item.id || "Томат";

        img.onerror = () => {
            img.onerror = null;
            img.src = "https://placehold.co/300x200?text=No+Photo";
        };

        const body = document.createElement("div");
        body.className = "card-body";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = item.name || ("ID: " + (item.id || ""));

        const meta = document.createElement("div");
        meta.className = "card-meta";
        const parts = [];
        if (item.color) parts.push("Цвет: " + item.color);
        if (item.type) parts.push("Тип: " + item.type);
        if (item.size) parts.push("Размер: " + item.size);
        meta.textContent = parts.join(" • ");

        body.appendChild(title);
        if (parts.length) body.appendChild(meta);

        card.appendChild(img);
        card.appendChild(body);

        card.addEventListener("click", () => {
            window.location.href = "tomato.html?id=" + item.id;
        });

        frag.appendChild(card);
    });

    cardsContainer.appendChild(frag);
}

function applyFilters() {
    const search = normalizeString(activeFilters.search);

    const filtered = allData.filter(item => {
        const name = normalizeString(item.name);
        const id = normalizeString(item.id);

        if (search && !name.includes(search) && !id.includes(search)) {
            return false;
        }

        if (activeFilters.color.length > 0) {
            const value = normalizeString(item.color);
            if (!activeFilters.color.some(v => normalizeString(v) === value)) {
                return false;
            }
        }

        if (activeFilters.type.length > 0) {
            const value = normalizeString(item.type);
            if (!activeFilters.type.some(v => normalizeString(v) === value)) {
                return false;
            }
        }

        if (activeFilters.size.length > 0) {
            const value = normalizeString(item.size);
            if (!activeFilters.size.some(v => normalizeString(v) === value)) {
                return false;
            }
        }

        return true;
    });

    renderCards(filtered);
}

function initMultiFilter(field) {
    const root = document.querySelector('.multi-filter[data-field="' + field + '"]');
    if (!root) return;

    const display = root.querySelector(".multi-filter-display");
    const dropdown = root.querySelector(".multi-filter-dropdown");
    const searchInput = root.querySelector(".multi-filter-search input");
    const optionsContainer = root.querySelector(".multi-filter-options");
    const btnClear = root.querySelector(".btn-clear");
    const btnApply = root.querySelector(".btn-apply");

    const placeholderText = display.dataset.placeholder || "";

    const values = uniqueSorted(allData.map(item => item[field]));

    optionsContainer.innerHTML = "";
    values.forEach(val => {
        const valueNorm = String(val || "").trim();
        if (!valueNorm) return;

        const safeId = (field + "_" + valueNorm)
            .replace(/\s+/g, "_")
            .replace(/[^\w\-]/g, "")
            .toLowerCase();

        const opt = document.createElement("div");
        opt.className = "multi-filter-option";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = safeId;
        checkbox.value = valueNorm;

        const label = document.createElement("label");
        label.setAttribute("for", safeId);
        label.textContent = valueNorm;

        opt.appendChild(checkbox);
        opt.appendChild(label);
        optionsContainer.appendChild(opt);
    });

    function updateDisplay() {
        const selected = activeFilters[field];
        display.innerHTML = "";

        if (!selected || selected.length === 0) {
            const span = document.createElement("span");
            span.className = "placeholder";
            span.textContent = placeholderText;
            display.appendChild(span);
            return;
        }

        selected.forEach(val => {
            const tag = document.createElement("span");
            tag.className = "tag";
            tag.textContent = val;

            const btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = "×";
            btn.style.marginLeft = "4px";
            btn.style.border = "none";
            btn.style.background = "transparent";
            btn.style.color = "#fff";
            btn.style.cursor = "pointer";

            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const idx = activeFilters[field].indexOf(val);
                if (idx !== -1) {
                    activeFilters[field].splice(idx, 1);
                    const cb = optionsContainer.querySelector('input[value="' + val + '"]');
                    if (cb) cb.checked = false;
                    updateDisplay();
                    applyFilters();
                }
            });

            tag.appendChild(btn);
            display.appendChild(tag);
        });
    }

    display.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    });

    document.addEventListener("click", () => {
        dropdown.style.display = "none";
    });

    dropdown.addEventListener("click", (e) => {
        e.stopPropagation();
    });

    searchInput.addEventListener("input", () => {
        const q = normalizeString(searchInput.value);
        const options = optionsContainer.querySelectorAll(".multi-filter-option");
        options.forEach(opt => {
            const label = opt.querySelector("label").textContent;
            opt.style.display = normalizeString(label).includes(q) ? "" : "none";
        });
    });

    btnClear.addEventListener("click", () => {
        activeFilters[field] = [];
        const checkboxes = optionsContainer.querySelectorAll("input[type=checkbox]");
        checkboxes.forEach(cb => cb.checked = false);
        updateDisplay();
        applyFilters();
    });

    btnApply.addEventListener("click", () => {
        const selected = [];
        const checkboxes = optionsContainer.querySelectorAll("input[type=checkbox]");
        checkboxes.forEach(cb => {
            if (cb.checked) selected.push(cb.value);
        });
        activeFilters[field] = selected;
        updateDisplay();
        dropdown.style.display = "none";
        applyFilters();
    });

    updateDisplay();
}

async function loadData() {
    try {
        const resp = await fetch(CSV_URL);
        const text = await resp.text();
        const rawData = parseCSV(text);

        allData = rawData.map(row => ({
            id: row.id,
            name: row.name,
            color: row.color,
            type: row.type,
            size: row.size,
            mainphoto: row.mainphoto,
            photo: row.photo,
            desc: row.desc
        }));

        initMultiFilter("color");
        initMultiFilter("type");
        initMultiFilter("size");

        renderCards(allData);
    } catch (e) {
        console.error("Ошибка загрузки данных", e);
        noResultsEl.style.display = "block";
        noResultsEl.textContent = "Ошибка загрузки данных";
    }
}

searchInput.addEventListener("input", () => {
    activeFilters.search = searchInput.value;
    applyFilters();
});

loadData();
</script>

</script>

</body>
</html>
