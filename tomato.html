<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Томат — карточка сорта</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #faf5e6;
            color: #222;
        }

        header {
            padding: 12px 16px;
            background: #b22222;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            padding: 8px 14px;
            background: #d32f2f;
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
        }

        .card-photo {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 16px;
            background: #eee;
            margin-bottom: 16px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;

        .meta {

            color: #555;
            margin-bottom: 16px;
        }

        .desc {
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .not-found {
            font-size: 20px;
            margin-top: 40px;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
