<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Томат — карточка сорта</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #faf5e6;
            color: #222;
        }

        header {
            padding: 12px 16px;
            background: #b22222;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            padding: 8px 14px;
            background: #d32f2f;
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
        }

        .card-photo {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 16px;
            background: #eee;
            margin-bottom: 16px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .meta {
            font-size: 15px;
            color: #555;
            margin-bottom: 16px;
        }

        .desc {
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .not-found {
            font-size: 20px;
            margin-top: 40px;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    <h1>Карточка томата</h1>
</header>

<main>
    <a href="catalog.html" class="back-link">← Назад в каталог</a>

    <img id="photo" class="card-photo" src="" alt="">

    <div id="title" class="title"></div>
    <div id="meta" class="meta"></div>
    <div id="desc" class="desc"></div>

    <div id="notFound" class="not-found" style="display:none;">
        Сорт с таким ID не найден.
    </div>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR1fdNIH6J3sLQDzsEXm-RRl8VlbBfWfEiPhpL_3xWHZfesBJ_qpCBEsEU0Xe4wbkAzDAntYFSP2cnQ/pub?output=csv";

function normalize(s) {
    return String(s || "").trim().toLowerCase();
}

function parseCSV(text) {
    const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
    const header = rows[0].split(",").map(h => h.trim().toLowerCase());
    return rows.slice(1).map(row => {
        const cols = row.split(",");
        const obj = {};
        header.forEach((name, idx) => {
            obj[name] = (cols[idx] || "").trim();
        });
        return obj;
    });
}

function getPhotoUrl(item) {
    const url = (item.mainphoto || item.photo || "").trim();
    if (!url || url === "undefined" || url === "null") {
        return "https://placehold.co/600x400?text=No+Photo";
    }
    return url;
}

(async function() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const photoEl = document.getElementById("photo");
    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const descEl = document.getElementById("desc");
    const notFoundEl = document.getElementById("notFound");

    if (!id) {
        notFoundEl.style.display = "block";
        return;
    }

    try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const data = parseCSV(text);

        const item = data.find(row => normalize(row.id) === normalize(id));

        if (!item) {
            notFoundEl.style.display = "block";
            return;
        }

        // Фото
        photoEl.src = getPhotoUrl(item);
        photoEl.alt = item.name || item.id || "Томат";

        // Заголовок
        titleEl.textContent = item.name || ("ID: " + item.id);

        // Метаданные
        const parts = [];
        if (item.color) parts.push("Цвет: " + item.color);
        if (item.type) parts.push("Тип: " + item.type);
        if (item.size) parts.push("Размер: " + item.size);
        metaEl.textContent = parts.join(" • ");

        // Описание
        descEl.textContent = item.desc || item.description || "";

    } catch (e) {
        console.error("Ошибка загрузки", e);
        notFoundEl.style.display = "block";
        notFoundEl.textContent = "Ошибка загрузки данных";
    }
})();
</script>

</body>
</html>
